name: Preview v2 no Firebase Hosting

on:
  push:
    branches:
      - v2

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KYBER_AGIL }}'
          channelId: v2-preview
          expires: 30d
          projectId: kyber-agil
